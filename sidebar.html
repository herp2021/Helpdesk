<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .status-card { transition: all 0.2s; cursor: pointer; }
    .status-card:hover { transform: translateY(-2px); background-color: #f3f4f6; }
    .loader {
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #3498db;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 p-4">
  <div id="content">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-gray-800">Pending Analysis</h2>
      <button onclick="refreshData()" class="p-2 text-blue-600 hover:bg-blue-50 rounded-full transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
    </div>

    <div id="loading" class="flex justify-center my-10">
      <div class="loader"></div>
    </div>

    <div id="results" class="hidden space-y-6">
      <!-- Summary Section -->
      <div>
        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">By Assigned Person (Click to Highlight)</h3>
        <div id="personCounts" class="space-y-2"></div>
      </div>

      <!-- Unassigned Section -->
      <div>
        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Unassigned Pending</h3>
        <div id="unassignedList" class="flex flex-wrap gap-2"></div>
      </div>
    </div>
  </div>

  <script>
    window.onload = refreshData;

    function refreshData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').classList.add('hidden');
      
      google.script.run
        .withSuccessHandler(displayData)
        .withFailureHandler(handleError)
        .getSidebarAnalysis();
    }

    function displayData(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');

      // 1. Display Person Counts
      const personDiv = document.getElementById('personCounts');
      personDiv.innerHTML = '';
      
      if (Object.keys(data.counts).length === 0) {
        personDiv.innerHTML = '<p class="text-sm text-gray-400 italic">No pending assignments found.</p>';
      } else {
        for (const [name, info] of Object.entries(data.counts)) {
          const card = document.createElement('div');
          card.className = 'status-card bg-white p-3 rounded-lg border border-gray-200 flex justify-between items-center shadow-sm';
          card.onclick = () => highlightMultipleRows(info.rows);
          card.innerHTML = `
            <span class="font-medium text-gray-700">${name || 'Unknown'}</span>
            <span class="bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-full text-sm font-bold">${info.count}</span>
          `;
          personDiv.appendChild(card);
        }
      }

      // 2. Display Unassigned Rows
      const unassignedDiv = document.getElementById('unassignedList');
      unassignedDiv.innerHTML = '';
      
      if (data.unassigned.length === 0) {
        unassignedDiv.innerHTML = '<p class="text-sm text-gray-400 italic">All pending rows are assigned.</p>';
      } else {
        data.unassigned.forEach(rowNum => {
          const btn = document.createElement('button');
          btn.onclick = () => jumpTo(rowNum);
          btn.className = 'bg-red-50 text-red-600 border border-red-200 px-3 py-1 rounded text-sm hover:bg-red-100 transition font-medium';
          btn.innerText = `Row ${rowNum}`;
          unassignedDiv.appendChild(btn);
        });
      }
    }

    function jumpTo(row) {
      google.script.run.highlightRow(row);
    }

    function highlightMultipleRows(rows) {
      google.script.run.highlightPersonRows(rows);
    }

    function handleError(err) {
      document.getElementById('loading').innerHTML = `<p class="text-red-500 text-sm">Error: ${err.message}</p>`;
    }
  </script>
</body>
</html>
